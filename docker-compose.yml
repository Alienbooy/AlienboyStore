version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: alienboy_postgres
    restart: always
    environment:
      POSTGRES_USER: alienboy_user
      POSTGRES_PASSWORD: alienboy_password
      POSTGRES_DB: alienboy_store
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  adminer:
    image: adminer
    container_name: alienboy_adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  postgres_data:
